name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # PyPI 发布
  build-pypi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install build tools
        run: pip install build twine

      - name: Build package
        run: python -m build

      - name: Upload to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: twine upload dist/*.tar.gz dist/*.whl

  # Linux 构建
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build with PyInstaller
        run: pyinstaller iamtrans.spec

      - name: Rename binary
        run: mv dist/iamtrans dist/iamtrans-linux

      - uses: actions/upload-artifact@v4
        with:
          name: iamtrans-linux
          path: dist/iamtrans-linux

  # macOS 构建
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build with PyInstaller
        run: pyinstaller iamtrans.spec

      - name: Rename binary
        run: mv dist/iamtrans dist/iamtrans-macos

      - uses: actions/upload-artifact@v4
        with:
          name: iamtrans-macos
          path: dist/iamtrans-macos

  # Windows 构建
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build with PyInstaller
        run: pyinstaller iamtrans.spec

      - name: Rename binary
        run: mv dist/iamtrans.exe dist/iamtrans-windows.exe

      - uses: actions/upload-artifact@v4
        with:
          name: iamtrans-windows
          path: dist/iamtrans-windows.exe

  # 发布到 GitHub Releases
  release:
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            iamtrans-linux/iamtrans-linux
            iamtrans-macos/iamtrans-macos
            iamtrans-windows/iamtrans-windows.exe
          body: |
            ## iamtrans ${{ github.ref_name }}

            终端翻译工具，支持有道翻译、Google Translate 和 MyMemory 三引擎。

            ### 下载

            | 平台 | 文件 |
            |------|------|
            | Linux | `iamtrans-linux` |
            | macOS | `iamtrans-macos` |
            | Windows | `iamtrans-windows.exe` |

            ### 使用

            ```bash
            # Linux/macOS
            chmod +x iamtrans-*
            ./iamtrans-linux              # 启动 TUI
            ./iamtrans-linux Hello World  # 简洁模式

            # Windows
            iamtrans-windows.exe          # 启动 TUI
            iamtrans-windows.exe Hello    # 简洁模式
            ```

            ### pip 安装

            ```bash
            pip install iamtrans
            iamtrans              # 启动 TUI
            iamtrans Hello World  # 简洁模式
            ```